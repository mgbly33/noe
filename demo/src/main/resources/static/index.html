<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理系统首页</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>商品与订单管理系统</h1>
        <nav class="nav">
            <a href="product.html">商品管理</a>
            <a href="category.html">分类管理</a>
            <a href="inventory.html">库存管理</a>
            <a href="pricing.html">价格管理</a>
            <a href="order.html">订单管理</a>
            <a href="user.html">用户管理</a>
            <a href="promotion.html">促销管理</a>
            <a href="review.html">评价管理</a>
            <a href="report.html">数据报表</a>
        </nav>
        <div class="panel">
            <h2 style="margin-bottom: 20px;">欢迎使用管理系统</h2>
            <p style="color: #666; line-height: 1.8;">
                本系统提供以下功能模块：
            </p>
            <ul style="margin: 20px 0; padding-left: 20px; color: #666; line-height: 2;">
                <li><strong>商品管理</strong> - 添加、编辑、删除商品</li>
                <li><strong>分类管理</strong> - 管理商品分类</li>
                <li><strong>库存管理</strong> - 查看和修改商品库存，低库存预警</li>
                <li><strong>价格管理</strong> - 设置标准价和促销价</li>
                <li><strong>订单管理</strong> - 查看订单、发货、处理订单状态</li>
                <li><strong>用户管理</strong> - 用户列表、角色分配、启用/禁用用户</li>
                <li><strong>促销管理</strong> - 优惠券管理、折扣活动设置</li>
                <li><strong>评价管理</strong> - 商品评价审核、回复管理</li>
                <li><strong>数据报表</strong> - 销售统计、热销商品、订单分析</li>
            </ul>
        </div>
    </div>
</body>
</html>

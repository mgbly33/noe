<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>分类管理</h1>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="product.html">商品管理</a>
            <a href="category.html" class="active">分类管理</a>
            <a href="inventory.html">库存管理</a>
            <a href="pricing.html">价格管理</a>
            <a href="order.html">订单管理</a>
        </nav>
        <div class="panel">
            <button class="btn btn-primary" onclick="showModal()">添加分类</button>
            <table>
                <thead><tr><th>ID</th><th>名称</th><th>描述</th><th>创建时间</th><th>操作</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">添加分类</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="form">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label>分类名称</label>
                    <input type="text" id="item-name" required>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="item-desc" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/category.js"></script>
</body>
</html>

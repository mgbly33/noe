<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>订单管理</h1>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="product.html">商品管理</a>
            <a href="category.html">分类管理</a>
            <a href="inventory.html">库存管理</a>
            <a href="pricing.html">价格管理</a>
            <a href="order.html" class="active">订单管理</a>
            <a href="user.html">用户管理</a>
            <a href="promotion.html">促销管理</a>
        </nav>
        <div class="panel">
            <div class="filter-bar">
                <input type="text" id="search-input" class="search-input" placeholder="搜索订单号/买家姓名/手机号" onkeyup="if(event.key==='Enter')searchOrders()">
                <button class="btn btn-primary" onclick="searchOrders()">搜索</button>
                <select id="status-filter" onchange="loadData()">
                    <option value="">全部状态</option>
                    <option value="PENDING_PAYMENT">待支付</option>
                    <option value="PENDING_SHIPMENT">待发货</option>
                    <option value="SHIPPED">已发货</option>
                    <option value="COMPLETED">已完成</option>
                    <option value="CANCELLED">已取消</option>
                </select>
                <button class="btn btn-success" onclick="showCreateModal()">创建订单</button>
            </div>
            <table>
                <thead><tr><th>订单号</th><th>买家</th><th>商品</th><th>金额</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 订单详情模态框 -->
    <div id="detail-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>订单详情</h3>
                <button class="modal-close" onclick="closeModal('detail-modal')">&times;</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- 发货模态框 -->
    <div id="ship-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>订单发货</h3>
                <button class="modal-close" onclick="closeModal('ship-modal')">&times;</button>
            </div>
            <form id="ship-form">
                <input type="hidden" id="ship-id">
                <p id="ship-order-no" style="margin-bottom:15px;font-weight:bold"></p>
                <div class="form-group">
                    <label>物流公司</label>
                    <input type="text" id="ship-company" required placeholder="如：顺丰速运">
                </div>
                <div class="form-group">
                    <label>物流单号</label>
                    <input type="text" id="ship-tracking" required placeholder="请输入物流单号">
                </div>
                <button type="submit" class="btn btn-success">确认发货</button>
            </form>
        </div>
    </div>

    <!-- 创建订单模态框 -->
    <div id="create-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建订单</h3>
                <button class="modal-close" onclick="closeModal('create-modal')">&times;</button>
            </div>
            <form id="create-form">
                <div class="form-row">
                    <div class="form-group"><label>买家姓名</label><input type="text" id="buyer-name" required></div>
                    <div class="form-group"><label>手机号</label><input type="text" id="buyer-phone" required></div>
                </div>
                <div class="form-group"><label>收货地址</label><textarea id="buyer-address" rows="2" required></textarea></div>
                <div class="form-group"><label>备注</label><textarea id="order-remark" rows="2"></textarea></div>
                <div class="form-group">
                    <label>添加商品</label>
                    <div class="form-row">
                        <select id="product-select" style="flex:2"></select>
                        <input type="number" id="product-qty" value="1" min="1" style="flex:1" placeholder="数量">
                        <button type="button" class="btn btn-info" onclick="addItem()">添加</button>
                    </div>
                </div>
                <div id="items-list" class="order-items"></div>
                <div style="text-align:right;font-weight:bold;margin:10px 0">总计: ¥<span id="order-total">0.00</span></div>
                <button type="submit" class="btn btn-primary">创建订单</button>
            </form>
        </div>
    </div>

    <!-- 支付模态框 -->
    <div id="pay-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>订单支付</h3>
                <button class="modal-close" onclick="closeModal('pay-modal')">&times;</button>
            </div>
            <div id="pay-content">
                <p id="pay-order-info" style="margin-bottom:15px"></p>
                <div class="form-group">
                    <label>选择支付方式</label>
                    <div class="payment-methods">
                        <label class="payment-option"><input type="radio" name="payMethod" value="ALIPAY" checked><span>支付宝</span></label>
                        <label class="payment-option"><input type="radio" name="payMethod" value="WECHAT"><span>微信支付</span></label>
                        <label class="payment-option"><input type="radio" name="payMethod" value="UNIONPAY"><span>银联支付</span></label>
                        <label class="payment-option"><input type="radio" name="payMethod" value="BALANCE"><span>余额支付</span></label>
                    </div>
                </div>
                <input type="hidden" id="pay-order-id">
                <button class="btn btn-success" onclick="confirmPay()" style="width:100%;padding:12px;font-size:16px">确认支付</button>
            </div>
            <div id="pay-result" class="hidden"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/order.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价格管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>价格管理</h1>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="product.html">商品管理</a>
            <a href="category.html">分类管理</a>
            <a href="inventory.html">库存管理</a>
            <a href="pricing.html" class="active">价格管理</a>
            <a href="order.html">订单管理</a>
        </nav>
        <div class="panel">
            <div class="filter-bar">
                <button class="btn btn-danger" onclick="loadPromotions()">查看促销商品</button>
                <button class="btn btn-primary" onclick="loadData()">查看全部</button>
            </div>
            <table>
                <thead><tr><th>ID</th><th>商品名称</th><th>标准价</th><th>促销价</th><th>促销状态</th><th>操作</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改价格</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="form">
                <input type="hidden" id="item-id">
                <p id="item-name" style="margin-bottom:15px;font-weight:bold"></p>
                <div class="form-group">
                    <label>标准价格</label>
                    <input type="number" step="0.01" id="item-standard" required>
                </div>
                <div class="form-group">
                    <label>促销价格</label>
                    <input type="number" step="0.01" id="item-promo">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="item-on-promo">
                    <label for="item-on-promo">开启促销</label>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/pricing.js"></script>
</body>
</html>

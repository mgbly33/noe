<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>用户管理</h1>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="product.html">商品管理</a>
            <a href="category.html">分类管理</a>
            <a href="inventory.html">库存管理</a>
            <a href="pricing.html">价格管理</a>
            <a href="order.html">订单管理</a>
            <a href="user.html" class="active">用户管理</a>
        </nav>
        <div class="panel">
            <div class="filter-bar">
                <input type="text" id="search-input" class="search-input" placeholder="搜索用户名/姓名/邮箱/手机号" onkeyup="if(event.key==='Enter')search()">
                <button class="btn btn-primary" onclick="search()">搜索</button>
                <select id="role-filter" onchange="loadData()">
                    <option value="">全部角色</option>
                    <option value="USER">普通用户</option>
                    <option value="ADMIN">管理员</option>
                </select>
                <select id="status-filter" onchange="loadData()">
                    <option value="">全部状态</option>
                    <option value="true">已启用</option>
                    <option value="false">已禁用</option>
                </select>
                <button class="btn btn-success" onclick="showCreateModal()">添加用户</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>姓名</th>
                        <th>邮箱</th>
                        <th>手机号</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <!-- 创建/编辑用户模态框 -->
    <div id="user-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">添加用户</h3>
                <button class="modal-close" onclick="closeModal('user-modal')">&times;</button>
            </div>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="user-username" required>
                    </div>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="user-name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="user-email">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="text" id="user-phone">
                    </div>
                </div>
                <div id="password-group" class="form-group">
                    <label>密码</label>
                    <input type="password" id="user-password">
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 角色分配模态框 -->
    <div id="role-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>分配角色</h3>
                <button class="modal-close" onclick="closeModal('role-modal')">&times;</button>
            </div>
            <form id="role-form">
                <input type="hidden" id="role-user-id">
                <p id="role-user-name" style="margin-bottom:15px;font-weight:bold"></p>
                <div class="form-group">
                    <label>选择角色</label>
                    <select id="role-select" required>
                        <option value="USER">普通用户</option>
                        <option value="ADMIN">管理员</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>

    <!-- 重置密码模态框 -->
    <div id="password-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>重置密码</h3>
                <button class="modal-close" onclick="closeModal('password-modal')">&times;</button>
            </div>
            <form id="password-form">
                <input type="hidden" id="pwd-user-id">
                <p id="pwd-user-name" style="margin-bottom:15px;font-weight:bold"></p>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="new-password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="confirm-password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">确认重置</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/user.js"></script>
</body>
</html>
